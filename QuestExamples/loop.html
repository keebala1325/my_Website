<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> 
    <h1>For Loop</h1>
    <p id="p1"></p>

     <h1>While Loop</h1>
    <p id="p2"></p>

     <h1>Do While Loop</h1>
    <p id="p3"></p>
    <script>
        for(let i=0;i<10;i++)
    {
        document.getElementById("p1").innerHTML+=i +"<br>";
    }

    let j=0;
    while(j<10)
    {
        document.getElementByiId("p2").innerHTML+=j+ "<br>";
        j++
    }
     let k=0;
  
    
    do{
        document.getElementByiId("p3").innerHTML+=j+ "<br>";
        k++;
        
    }while(k<10)

   



    </script>
</body>
