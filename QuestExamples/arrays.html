<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<p id="demo"></p>
<p id="demo1"></p>
<p id="demo2"></p>
<p id="demo3"></p>
<p id="demo4"></p>
    <p id="p3"></p>
        <script>
          let arr = [1,2,3,4,5];
          let arr2 = new Array(6,7,8,9,10);
          let arr3 = ["Hello","world","javascript"];
          let arr4 = ["Hello",1,2,4,true];
          document.getElementById("demo").innerHTML = arr + "<br>" +arr2;
          document.getElementById("demo1").innerHTML = arr3;
          document.getElementById("demo2").innerHTML = arr4;

          document.getElementById("demo3").innerHTML = "Length of arr is : " +arr.length;
          document.getElementById("demo4").innerHTML = "Min of arr is : " +Math.min(...arr) + "<br>" + " Max of arr is : "
          +Math.max(...arr);


        </script>
   </body>
