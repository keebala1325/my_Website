<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> 
<button onclick="msg()">Click Me</button>
<button onclick="showConfirm()">Delete</button>
<p id="p1"></p>
<button onclick="showPrompt()">Enter name</button>
<p id="p2"></p>
    <script>
           function msg()
           {
            alert("Hello World");
           }

           function showConfirm()
           {
            let answer = confirm("Are you sure you want to delete?");
            if(answer)
           {
            document.getElementById("p1").innerHTML = "Delete successfully";
           }

           else
           {
             document.getElementById("p1").innerHTML = "Delete cancelled";
           }

           function showPrompt()
           {
                let name = prompt("Enter your name");
                if(name!=null)
                {
                    document.getElementById("p2").innerHTML = "Hello" +name;
                }

                else
                {
                     document.getElementById("p2").innerHTML = "User Cancelled";
                }
           }
           }
    </script>


    </body>
