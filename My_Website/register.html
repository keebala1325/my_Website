<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>

  <!-- Bootstrap CSS from CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html"> <img src="log.png.png" class="logo" alt="Logo"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT-->
    <!-- REGISTER FORM -->
  <section class="container my-5">
    <h2 class="text-center mb-4">Register 📝</h2>

    <form action="thankyou.html">

      <!-- Full Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your full name">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter your password">
      </div>

      <!-- Gender -->
      <div class="mb-3">
        <label class="form-label">Gender</label><br>
        <input type="radio" name="gender" value="male"> Male &nbsp;
        <input type="radio" name="gender" value="female"> Female &nbsp;
        <input type="radio" name="gender" value="other"> Other
      </div>

      <!-- Country -->
      <div class="mb-3">
        <label class="form-label">Country</label>
        <select class="form-control">
          <option value="">-- Select Country --</option>
          <option>India</option>
          <option>Saudi Arabia</option>
          <option>UAE</option>
          <option>United Kingdom</option>
          <option>United States</option>
        </select>
      </div>

      <!-- Interests -->
      <div class="mb-3">
        <label class="form-label">Interests</label><br>
        <input type="checkbox" value="HTML"> Sea Food &nbsp;
        <input type="checkbox" value="CSS"> Non-Veg &nbsp;
        <input type="checkbox" value="JavaScript"> Veg Foods &nbsp;
        <input type="checkbox" value="Python"> Sweet &nbsp;
        <input type="checkbox" value="React"> Spicy
      </div>

      <!-- Profile Picture -->
      <div class="mb-3">
        <label class="form-label">Profile Picture</label>
        <input type="file" class="form-control">
      </div>

      <!-- Buttons -->
      <button type="submit" class="btn custom-btn me-2">Submit</button>
      <button type="reset" class="btn btn-secondary">Reset</button>

    </form>
  </section>


  <!-- FOOTER  -->
   <footer class="text-white text-center py-3 mt-5">
    <p>&copy; <span id="year"></span> Kerala Kitchen. All rights reserved.</p>
    <p>
      <a href="home.html" class="text-white me-3">Home</a>
      <a href="about.html" class="text-white me-3">About</a>
      <a href="contact.html" class="text-white">Contact</a>
    </p>
  </footer>


  <!-- Bootstrap JS (needed for dropdowns, etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>  document.getElementById("year").textContent = new Date().getFullYear();</script>

</body>
</html>
