<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="ProfileCard.css" >

</head>
<body>
<div class="card">
    <img  src="profileCardImage.png" alt="Profile Photo">

    <!-- name and role -->
     <h1>Keerthana Vinod</h1>
     <p class ="role">Java Full Stack Develper</p>

     <p>📧 keerthanavinod@gmail.com</p>
    <p>📍 Kottayam, India</p>

    <!--Button-->
    <button onclick ="toggleSkills()">Show skills</button>
    <div id="skills">
        <h3>My Skills</h3>
         <p>Java | MySQL | HTML | CSS | JavaScript</p>
    </div>
</div>
    

    <script>
        function toggleSkills()
        {
            const skills = document.getElementById("skills");
            const button = document.querySelector("button");

            // Check if skills is hidden or visible
            //none"` is a **CSS value** that means: (display: none)  =  completely hide the element
            //it becomes invisible AND takes up NO space on the page
            // if the display inside the css is given none then the skill is hidden so when user click the button,
            //it should show the skills , and text should be changed to hide skills 
            if(skills.style.display=="none") //Checks if skills is hidden
        {
            // if hidden, show it
             skills.style.display = "block";//Makes skills visible

              // Change button text to "Hide Skills"
            button.innerText = "Hide Skills";
        }

        else
        {
            skills.style.display = "none";
            // Change button text back to "Show Skills"
            button.innerText = "Show Skills";
        }
        }
    </script>
</body>
</html>
